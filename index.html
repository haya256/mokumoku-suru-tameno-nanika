<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>もくもく会</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: row;
      height: 100dvh;
    }

    #roomView {
      position: relative;
      flex-shrink: 0;
      align-self: center;
      width: min(50vw, 100dvh);
      aspect-ratio: 1 / 1;
    }

    #roomView img {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #roomOverlay {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }

    .cell {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      /* キャラ下端を部屋の高さの14%に保つ(バッジは絶対配置なので高さ分を足す) */
      padding-bottom: calc(14% + 24px);
    }

    /* キャラクターのスプライトシート: 9列×6行。1キャラ=3列×2行(6ポーズ)のブロックが部屋と同じ3×3配置 */
    .cell .chara {
      width: 33%;
      aspect-ratio: 2 / 3;
      background-image: url("/chara-image.png");
      background-size: 900% 600%;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      animation: bob 2s steps(1, end) infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .cell .badge {
      position: absolute;
      bottom: 5%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      border-radius: 999px;
      padding: 3px 12px;
      font-size: 0.85rem;
      font-weight: bold;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100dvh;
    }

    @media (max-width: 800px) {
      body {
        flex-direction: column;
        height: auto;
        min-height: 100dvh;
      }

      #roomView {
        width: 100%;
        align-self: auto;
      }

      #main {
        height: auto;
        flex: 1;
      }
    }

    header {
      background: #333;
      color: #fff;
      padding: 12px 16px;
      font-size: 1.1rem;
      font-weight: bold;
    }

    #board {
      background: #fff;
      border-bottom: 2px dashed #bbb;
      padding: 10px 16px;
      max-height: 30dvh;
      overflow-y: auto;
    }

    #board h2 {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
    }

    #board .empty {
      font-size: 0.85rem;
      color: #aaa;
    }

    .entry {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 4px 0;
      font-size: 0.9rem;
    }

    .entry .room {
      background: #333;
      color: #fff;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .entry .who {
      font-weight: bold;
      flex-shrink: 0;
    }

    .entry .when {
      color: #888;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .entry .what {
      word-break: break-word;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      background: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      max-width: 480px;
    }

    .msg .meta {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 2px;
    }

    .msg .meta span {
      font-weight: bold;
      color: #333;
    }

    .msg .text {
      font-size: 0.95rem;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg.system {
      background: none;
      border-radius: 0;
      align-self: center;
      max-width: none;
      padding: 2px 12px;
      font-size: 0.8rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg.system .stamp {
      opacity: 0.7;
      margin-right: 6px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
    }

    form .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row label {
      font-size: 0.8rem;
      color: #888;
      flex-shrink: 0;
    }

    input[type="time"] {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 7px 6px;
      font-size: 0.9rem;
      outline: none;
    }

    input[type="text"], textarea {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.95rem;
      outline: none;
    }

    input[type="text"]:focus, textarea:focus {
      border-color: #555;
    }

    textarea {
      font-family: inherit;
      line-height: 1.4;
      resize: none;
      max-height: 120px;
      overflow-y: auto;
    }

    #name { width: 100px; flex-shrink: 0; }
    #text { flex: 1; }
    #task { flex: 1; min-width: 0; }

    button {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button:hover { background: #555; }

    #joinBtn {
      background: #2a7;
      flex-shrink: 0;
    }

    #joinBtn:hover { background: #3b8; }

    #editBtn { flex-shrink: 0; }

    #recordLabel {
      font-size: 0.85rem;
      color: #555;
      flex-shrink: 0;
    }

    #recordText {
      flex: 1;
      min-width: 0;
      background: #f8f8f8;
      font-size: 0.85rem;
    }

    #copyBtn { flex-shrink: 0; }

    #closeRecordBtn {
      background: #fff;
      color: #888;
      border: 1px solid #ccc;
      flex-shrink: 0;
    }

    #closeRecordBtn:hover { background: #eee; }

    #leaveBtn {
      background: #fff;
      color: #c33;
      border: 1px solid #c33;
      flex-shrink: 0;
    }

    #leaveBtn:hover { background: #fee; }

    #myStatus {
      flex: 1;
      font-size: 0.9rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="roomView">
    <img src="/room-image.png" alt="ルーム一覧">
    <div id="roomOverlay"></div>
  </div>
  <div id="main">
  <header>もくもく会</header>
  <div id="board">
    <h2>いまもくもく中</h2>
    <div id="entries"><div class="empty">まだ誰ももくもくしていません</div></div>
  </div>
  <div id="messages"></div>
  <form id="form">
    <div class="row" id="joinRow">
      <input id="name" type="text" placeholder="名前">
      <input id="task" type="text" placeholder="もくもくする内容(ボードに載ります)">
      <label for="start">開始</label>
      <input id="start" type="time">
      <label for="end">終了予定</label>
      <input id="end" type="time">
      <button type="button" id="joinBtn">入室</button>
    </div>
    <div class="row" id="statusRow" style="display: none;">
      <span id="myStatus"></span>
      <button type="button" id="editBtn">編集</button>
      <button type="button" id="leaveBtn">退室</button>
    </div>
    <div class="row" id="recordRow" style="display: none;">
      <span id="recordLabel">📋 今日の記録</span>
      <input id="recordText" type="text" readonly>
      <button type="button" id="copyBtn">コピー</button>
      <button type="button" id="closeRecordBtn">✕</button>
    </div>
    <div class="row" id="chatRow" style="display: none;">
      <textarea id="text" placeholder="コメント (Shift+Enterで改行)" rows="1"></textarea>
      <button type="submit">送信</button>
    </div>
  </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const entriesEl = document.getElementById("entries");
    const form = document.getElementById("form");
    const nameEl = document.getElementById("name");
    const textEl = document.getElementById("text");
    const taskEl = document.getElementById("task");
    const startEl = document.getElementById("start");
    const endEl = document.getElementById("end");
    const joinRow = document.getElementById("joinRow");
    const statusRow = document.getElementById("statusRow");
    const chatRow = document.getElementById("chatRow");
    const myStatusEl = document.getElementById("myStatus");
    const joinBtn = document.getElementById("joinBtn");
    const editBtn = document.getElementById("editBtn");
    const leaveBtn = document.getElementById("leaveBtn");
    const recordRow = document.getElementById("recordRow");
    const recordText = document.getElementById("recordText");
    const copyBtn = document.getElementById("copyBtn");
    const closeRecordBtn = document.getElementById("closeRecordBtn");

    let editing = false;
    let lastEntries = [];
    nameEl.value = localStorage.getItem("mokumoku-name") || "";
    // 入室を待たず、名前欄の変更時点で即保存する
    nameEl.addEventListener("input", () => {
      localStorage.setItem("mokumoku-name", nameEl.value.trim());
    });

    // 本人識別用ID(ブラウザごとに固定)。名前は表示用なので変更しても別人にならない
    // ※crypto.randomUUIDはLAN経由のhttpアクセス(非セキュアコンテキスト)では使えないため自前生成
    let clientId = localStorage.getItem("mokumoku-id");
    if (!clientId) {
      clientId = Date.now().toString(36) + Math.random().toString(36).slice(2, 10);
      localStorage.setItem("mokumoku-id", clientId);
    }
    const roomOverlayEl = document.getElementById("roomOverlay");

    const ROOM_COUNT = 9;
    const roomCells = [];
    for (let i = 1; i <= ROOM_COUNT; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      roomOverlayEl.appendChild(cell);
      roomCells.push(cell);
    }

    let lastCount = 0;

    function render(msgs) {
      if (msgs.length === lastCount) return;
      messagesEl.innerHTML = "";
      msgs.forEach(m => {
        const div = document.createElement("div");
        if (m.system) {
          div.className = "msg system";
          div.innerHTML = `<span class="stamp">${esc(m.time)}</span>${esc(m.text)}`;
        } else {
          div.className = "msg";
          div.innerHTML = `<div class="meta"><span>${esc(m.name)}</span> ${esc(m.time)}</div><div class="text">${esc(m.text)}</div>`;
        }
        messagesEl.appendChild(div);
      });
      lastCount = msgs.length;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    let lastRoomState = "";

    function renderRooms(entries) {
      // ポーズ(0〜2)は入室時にサーバーが決めて退室まで固定
      const occupants = entries.map(e => ({ room: e.room, name: e.name, task: e.task, pose: e.pose || 0 }));
      // 変化がなければDOMを触らない(作り直すとCSSアニメーションがリセットされるため)
      const state = JSON.stringify(occupants);
      if (state === lastRoomState) return;
      lastRoomState = state;
      roomCells.forEach(cell => cell.innerHTML = "");
      occupants.forEach(o => {
        const cell = roomCells[o.room - 1];
        if (!cell) return;
        const chara = document.createElement("div");
        chara.className = "chara";
        const col = ((o.room - 1) % 3) * 3 + o.pose;
        const row = Math.floor((o.room - 1) / 3) * 2;
        chara.style.backgroundPosition = `${col / 8 * 100}% ${row / 5 * 100}%`;
        chara.style.animationDelay = `${(o.room * 0.3) % 2}s`;
        cell.appendChild(chara);
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = o.name;
        badge.title = o.task;
        cell.appendChild(badge);
      });
    }

    function renderBoard(entries) {
      lastEntries = entries;
      renderRooms(entries);
      updateMyStatus();
      if (entries.length === 0) {
        entriesEl.innerHTML = `<div class="empty">まだ誰ももくもくしていません</div>`;
        return;
      }
      entriesEl.innerHTML = "";
      entries.forEach(e => {
        const div = document.createElement("div");
        div.className = "entry";
        const when = `${esc(e.start)}〜${esc(e.end || "?")}`;
        div.innerHTML = `<span class="room">Room ${e.room}</span><span class="who">${esc(e.name)}</span><span class="when">${when}</span><span class="what">${esc(e.task)}</span>`;
        entriesEl.appendChild(div);
      });
    }

    // 入室状態に応じてフォームを切替:
    //   入室前     → 入室フォームのみ(チャット不可)
    //   入室中     → ステータス+編集/退室ボタン+チャット
    //   編集モード → 入室フォーム(ボタンは「更新」)+チャット
    function updateMyStatus() {
      const mine = lastEntries.find(e => e.id === clientId);
      if (mine) {
        const until = mine.end ? `〜${mine.end}` : "〜";
        myStatusEl.textContent = `🟢 ${mine.name}: ルーム${mine.room}でもくもく中(${mine.start}${until}): ${mine.task}`;
        joinRow.style.display = editing ? "flex" : "none";
        statusRow.style.display = editing ? "none" : "flex";
        chatRow.style.display = "flex";
        joinBtn.textContent = "更新";
      } else {
        editing = false;
        joinRow.style.display = "flex";
        statusRow.style.display = "none";
        chatRow.style.display = "none";
        joinBtn.textContent = "入室";
      }
    }

    function esc(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function nowHHMM() {
      return new Date().toTimeString().slice(0, 5);
    }

    async function poll() {
      try {
        const [msgRes, boardRes] = await Promise.all([fetch("/messages"), fetch("/board")]);
        render(await msgRes.json());
        renderBoard(await boardRes.json());
      } catch {}
    }

    taskEl.addEventListener("input", () => {
      if (taskEl.value && !startEl.value) startEl.value = nowHHMM();
    });

    // Enterで送信、Shift+Enterで改行(IME変換確定のEnterでは送信しない)
    textEl.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey && !e.isComposing) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    // 入力に合わせて高さを自動調整
    textEl.addEventListener("input", () => {
      textEl.style.height = "auto";
      textEl.style.height = Math.min(textEl.scrollHeight, 120) + "px";
    });

    form.addEventListener("submit", async e => {
      e.preventDefault();
      const name = nameEl.value.trim();
      const text = textEl.value.trim();
      if (!name || !text) return;
      await fetch("/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, text }),
      });
      textEl.value = "";
      textEl.style.height = "auto";
      await poll();
    });

    joinBtn.addEventListener("click", async () => {
      const name = nameEl.value.trim();
      const task = taskEl.value.trim();
      if (!name) { alert("名前を入力してください"); nameEl.focus(); return; }
      if (!task) { alert("もくもくする内容を入力してください"); taskEl.focus(); return; }
      const res = await fetch("/board/join", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: clientId, name, task, start: startEl.value, end: endEl.value }),
      });
      const result = await res.json();
      if (result.roomFull) {
        alert("満室です。空きが出るまでお待ちください");
        return;
      }
      recordRow.style.display = "none";
      const wasEditing = editing;
      editing = false;
      // 新規入室時は挨拶メッセージを規定値としてセット
      if (!wasEditing && !textEl.value) {
        textEl.value = `${task}でもくもくします`;
      }
      await poll();
      textEl.focus();
    });

    editBtn.addEventListener("click", () => {
      const mine = lastEntries.find(e => e.id === clientId);
      if (!mine) return;
      editing = true;
      nameEl.value = mine.name;
      taskEl.value = mine.task;
      startEl.value = mine.start;
      endEl.value = mine.end;
      updateMyStatus();
      taskEl.focus();
    });

    // 入室フォームでEnterを押したら入室(IME変換確定は除く)
    [nameEl, taskEl].forEach(el => el.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.isComposing) {
        e.preventDefault();
        joinBtn.click();
      }
    }));

    leaveBtn.addEventListener("click", async () => {
      const res = await fetch("/board/leave", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: clientId }),
      });
      const result = await res.json();
      taskEl.value = "";
      startEl.value = "";
      endEl.value = "";
      if (result.record) {
        recordText.value = result.record;
        recordRow.style.display = "flex";
      }
      await poll();
    });

    copyBtn.addEventListener("click", async () => {
      recordText.select();
      let ok = false;
      // LAN経由のhttp(非セキュアコンテキスト)ではclipboard APIが使えないためexecCommandにフォールバック
      if (navigator.clipboard && window.isSecureContext) {
        try { await navigator.clipboard.writeText(recordText.value); ok = true; } catch {}
      }
      if (!ok) ok = document.execCommand("copy");
      copyBtn.textContent = ok ? "コピーしました" : "コピー失敗";
      setTimeout(() => { copyBtn.textContent = "コピー"; }, 1500);
    });

    closeRecordBtn.addEventListener("click", () => {
      recordRow.style.display = "none";
    });

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
