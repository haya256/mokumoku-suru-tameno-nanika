<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>もくもく会</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      background: #333;
      color: #fff;
      padding: 12px 16px;
      font-size: 1.1rem;
      font-weight: bold;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      background: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      max-width: 480px;
    }

    .msg .meta {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 2px;
    }

    .msg .meta span {
      font-weight: bold;
      color: #333;
    }

    .msg .text {
      font-size: 0.95rem;
      word-break: break-word;
    }

    form {
      display: flex;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
    }

    input[type="text"] {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.95rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #555;
    }

    #name { width: 100px; flex-shrink: 0; }
    #text { flex: 1; }

    button {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button:hover { background: #555; }
  </style>
</head>
<body>
  <header>もくもく会</header>
  <div id="messages"></div>
  <form id="form">
    <input id="name" type="text" placeholder="名前" required>
    <input id="text" type="text" placeholder="コメント" required>
    <button type="submit">送信</button>
  </form>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("form");
    const nameEl = document.getElementById("name");
    const textEl = document.getElementById("text");

    let lastCount = 0;

    function render(msgs) {
      if (msgs.length === lastCount) return;
      messagesEl.innerHTML = "";
      msgs.forEach(m => {
        const div = document.createElement("div");
        div.className = "msg";
        div.innerHTML = `<div class="meta"><span>${esc(m.name)}</span> ${esc(m.time)}</div><div class="text">${esc(m.text)}</div>`;
        messagesEl.appendChild(div);
      });
      lastCount = msgs.length;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function esc(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    async function poll() {
      try {
        const res = await fetch("/messages");
        render(await res.json());
      } catch {}
    }

    form.addEventListener("submit", async e => {
      e.preventDefault();
      const name = nameEl.value.trim();
      const text = textEl.value.trim();
      if (!name || !text) return;
      await fetch("/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, text }),
      });
      textEl.value = "";
      await poll();
    });

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
