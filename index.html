<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>もくもく会</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: row;
      height: 100dvh;
    }

    #roomView {
      position: relative;
      flex-shrink: 0;
      align-self: center;
      width: min(50vw, 100dvh);
      aspect-ratio: 1 / 1;
    }

    #roomView img {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    #roomOverlay {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }

    .cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 4%;
    }

    /* キャラクターのスプライトシート: 9列×6行。1キャラ=3列×2行(6ポーズ)のブロックが部屋と同じ3×3配置 */
    .cell .chara {
      width: 33%;
      aspect-ratio: 2 / 3;
      background-image: url("/chara-image.png");
      background-size: 900% 600%;
      background-repeat: no-repeat;
      image-rendering: pixelated;
      animation: bob 2s steps(1, end) infinite;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .cell .badge {
      background: rgba(0, 0, 0, 0.65);
      color: #fff;
      border-radius: 999px;
      padding: 3px 12px;
      font-size: 0.85rem;
      font-weight: bold;
      max-width: 90%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100dvh;
    }

    @media (max-width: 800px) {
      body {
        flex-direction: column;
        height: auto;
        min-height: 100dvh;
      }

      #roomView {
        width: 100%;
        align-self: auto;
      }

      #main {
        height: auto;
        flex: 1;
      }
    }

    header {
      background: #333;
      color: #fff;
      padding: 12px 16px;
      font-size: 1.1rem;
      font-weight: bold;
    }

    #board {
      background: #fff;
      border-bottom: 2px dashed #bbb;
      padding: 10px 16px;
      max-height: 30dvh;
      overflow-y: auto;
    }

    #board h2 {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 6px;
    }

    #board .empty {
      font-size: 0.85rem;
      color: #aaa;
    }

    .entry {
      display: flex;
      align-items: baseline;
      gap: 10px;
      padding: 4px 0;
      font-size: 0.9rem;
    }

    .entry .room {
      background: #333;
      color: #fff;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .entry .who {
      font-weight: bold;
      flex-shrink: 0;
    }

    .entry .when {
      color: #888;
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    .entry .what {
      word-break: break-word;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .msg {
      background: #fff;
      border-radius: 8px;
      padding: 8px 12px;
      max-width: 480px;
    }

    .msg .meta {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 2px;
    }

    .msg .meta span {
      font-weight: bold;
      color: #333;
    }

    .msg .text {
      font-size: 0.95rem;
      word-break: break-word;
    }

    .msg.system {
      background: none;
      border-radius: 0;
      align-self: center;
      max-width: none;
      padding: 2px 12px;
      font-size: 0.8rem;
      color: #888;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .msg.system .stamp {
      opacity: 0.7;
      margin-right: 6px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px 16px;
      background: #fff;
      border-top: 1px solid #ddd;
    }

    form .row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .row label {
      font-size: 0.8rem;
      color: #888;
      flex-shrink: 0;
    }

    input[type="time"] {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 7px 6px;
      font-size: 0.9rem;
      outline: none;
    }

    input[type="text"] {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.95rem;
      outline: none;
    }

    input[type="text"]:focus {
      border-color: #555;
    }

    #name { width: 100px; flex-shrink: 0; }
    #text { flex: 1; }
    #task { flex: 1; }

    button {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 0.95rem;
      cursor: pointer;
    }

    button:hover { background: #555; }

    #endBtn {
      background: #fff;
      color: #c33;
      border: 1px solid #c33;
    }

    #endBtn:hover { background: #fee; }
  </style>
</head>
<body>
  <div id="roomView">
    <img src="/room-image.png" alt="ルーム一覧">
    <div id="roomOverlay"></div>
  </div>
  <div id="main">
  <header>もくもく会</header>
  <div id="board">
    <h2>いまもくもく中</h2>
    <div id="entries"><div class="empty">まだ誰ももくもくしていません</div></div>
  </div>
  <div id="messages"></div>
  <form id="form">
    <div class="row">
      <input id="task" type="text" placeholder="もくもくする内容(ボードに載ります)">
      <label for="start">開始</label>
      <input id="start" type="time">
      <label for="end">終了予定</label>
      <input id="end" type="time">
      <button type="button" id="endBtn">終わる</button>
    </div>
    <div class="row">
      <input id="name" type="text" placeholder="名前" required>
      <input id="text" type="text" placeholder="コメント" required>
      <button type="submit">送信</button>
    </div>
  </form>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const entriesEl = document.getElementById("entries");
    const form = document.getElementById("form");
    const nameEl = document.getElementById("name");
    const textEl = document.getElementById("text");
    const taskEl = document.getElementById("task");
    const startEl = document.getElementById("start");
    const endEl = document.getElementById("end");
    const endBtn = document.getElementById("endBtn");
    const roomOverlayEl = document.getElementById("roomOverlay");

    const ROOM_COUNT = 9;
    const roomCells = [];
    for (let i = 1; i <= ROOM_COUNT; i++) {
      const cell = document.createElement("div");
      cell.className = "cell";
      roomOverlayEl.appendChild(cell);
      roomCells.push(cell);
    }

    let lastCount = 0;

    function render(msgs) {
      if (msgs.length === lastCount) return;
      messagesEl.innerHTML = "";
      msgs.forEach(m => {
        const div = document.createElement("div");
        if (m.system) {
          div.className = "msg system";
          div.innerHTML = `<span class="stamp">${esc(m.time)}</span>${esc(m.text)}`;
        } else {
          div.className = "msg";
          div.innerHTML = `<div class="meta"><span>${esc(m.name)}</span> ${esc(m.time)}</div><div class="text">${esc(m.text)}</div>`;
        }
        messagesEl.appendChild(div);
      });
      lastCount = msgs.length;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    let lastRoomState = "";

    function renderRooms(entries) {
      // ポーズ(0〜2)は入室時にサーバーが決めて退室まで固定
      const occupants = entries.map(e => ({ room: e.room, name: e.name, task: e.task, pose: e.pose || 0 }));
      // 変化がなければDOMを触らない(作り直すとCSSアニメーションがリセットされるため)
      const state = JSON.stringify(occupants);
      if (state === lastRoomState) return;
      lastRoomState = state;
      roomCells.forEach(cell => cell.innerHTML = "");
      occupants.forEach(o => {
        const cell = roomCells[o.room - 1];
        if (!cell) return;
        const chara = document.createElement("div");
        chara.className = "chara";
        const col = ((o.room - 1) % 3) * 3 + o.pose;
        const row = Math.floor((o.room - 1) / 3) * 2;
        chara.style.backgroundPosition = `${col / 8 * 100}% ${row / 5 * 100}%`;
        chara.style.animationDelay = `${(o.room * 0.3) % 2}s`;
        cell.appendChild(chara);
        const badge = document.createElement("span");
        badge.className = "badge";
        badge.textContent = o.name;
        badge.title = o.task;
        cell.appendChild(badge);
      });
    }

    function renderBoard(entries) {
      renderRooms(entries);
      if (entries.length === 0) {
        entriesEl.innerHTML = `<div class="empty">まだ誰ももくもくしていません</div>`;
        return;
      }
      entriesEl.innerHTML = "";
      entries.forEach(e => {
        const div = document.createElement("div");
        div.className = "entry";
        const when = `${esc(e.start)}〜${esc(e.end || "?")}`;
        div.innerHTML = `<span class="room">Room ${e.room}</span><span class="who">${esc(e.name)}</span><span class="when">${when}</span><span class="what">${esc(e.task)}</span>`;
        entriesEl.appendChild(div);
      });

      // リロード後の復元: 自分のエントリがあってフィールドが空ならプリフィル
      const mine = entries.find(e => e.name === nameEl.value.trim());
      if (mine && !taskEl.value && !startEl.value && !endEl.value) {
        taskEl.value = mine.task;
        startEl.value = mine.start;
        endEl.value = mine.end;
      }
    }

    function esc(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

    function nowHHMM() {
      return new Date().toTimeString().slice(0, 5);
    }

    async function poll() {
      try {
        const [msgRes, boardRes] = await Promise.all([fetch("/messages"), fetch("/board")]);
        render(await msgRes.json());
        renderBoard(await boardRes.json());
      } catch {}
    }

    taskEl.addEventListener("input", () => {
      if (taskEl.value && !startEl.value) startEl.value = nowHHMM();
    });

    form.addEventListener("submit", async e => {
      e.preventDefault();
      const name = nameEl.value.trim();
      const text = textEl.value.trim();
      if (!name || !text) return;
      const res = await fetch("/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          name, text,
          task: taskEl.value.trim(),
          start: startEl.value,
          end: endEl.value,
        }),
      });
      const result = await res.json();
      if (result.roomFull) {
        alert("満室です。空きが出るまでお待ちください");
      }
      textEl.value = "";
      await poll();
    });

    endBtn.addEventListener("click", async () => {
      const name = nameEl.value.trim();
      if (!name) return;
      await fetch("/board/end", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name }),
      });
      taskEl.value = "";
      startEl.value = "";
      endEl.value = "";
      await poll();
    });

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
